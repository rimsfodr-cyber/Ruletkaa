<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Премиум Рулетка — Золотые призы</title>

    <!-- Google Fonts: премиальные шрифты -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #08080f;
            --bg-secondary: #111122;
            --gold: #d4a843;
            --gold-bright: #f0c960;
            --gold-dark: #8b6914;
            --gold-glow: #f7d774;
            --text: #e8e6e1;
            --text-secondary: #b0ada5;
            --danger: #c0392b;
            --success: #27ae60;
            --silver: #b8b8c0;
            --bronze: #b87333;
            --rose-gold: #e8c547;
            --rare-gold: #ffd700;
            --modal-bg: #1a1a2e;
            --wheel-size: 500px;
            --transition-speed: 0.35s;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            font-size: 16px;
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: radial-gradient(ellipse at 50% 30%, #12122a 0%, #08080f 65%, #040408 100%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 20px 16px 40px;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        /* Декоративный фоновый узор */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at 20% 25%, rgba(212, 168, 67, 0.04) 0%, transparent 50%),
                radial-gradient(circle at 75% 60%, rgba(212, 168, 67, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 50% 85%, rgba(240, 201, 96, 0.05) 0%, transparent 40%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 700px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 28px;
        }

        /* ===== Заголовок ===== */
        .header {
            text-align: center;
        }
        .header__title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 5vw, 2.8rem);
            font-weight: 800;
            letter-spacing: 0.03em;
            background: linear-gradient(180deg, #f7d774 0%, #c9973a 40%, #8b6914 70%, #c9973a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 2px 6px rgba(212, 168, 67, 0.5));
            margin-bottom: 2px;
        }
        .header__subtitle {
            font-size: 0.9rem;
            color: var(--text-secondary);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            font-weight: 400;
        }

        /* ===== Секция колеса ===== */
        .wheel-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 100%;
        }
        .wheel-wrapper {
            position: relative;
            width: min(var(--wheel-size), 85vw);
            height: min(var(--wheel-size), 85vw);
            flex-shrink: 0;
        }
        .wheel-glow {
            position: absolute;
            inset: -18px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(212, 168, 67, 0.25) 0%, rgba(212, 168, 67, 0.06) 50%, transparent 70%);
            pointer-events: none;
            animation: glowPulse 3s ease-in-out infinite;
            z-index: 0;
        }
        @keyframes glowPulse {
            0%,
            100% {
                opacity: 0.7;
                transform: scale(1);
            }
            50% {
                opacity: 1;
                transform: scale(1.04);
            }
        }
        .wheel-glow.spinning {
            animation: glowSpin 0.6s ease-in-out infinite;
        }
        @keyframes glowSpin {
            0%,
            100% {
                opacity: 0.9;
                transform: scale(1.03);
            }
            50% {
                opacity: 1;
                transform: scale(1.08);
            }
        }
        canvas#wheelCanvas {
            position: relative;
            z-index: 1;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            filter: drop-shadow(0 0 20px rgba(180, 140, 60, 0.5)) drop-shadow(0 8px 32px rgba(0, 0, 0, 0.6));
            transition: filter 0.4s;
            cursor: default;
        }
        .wheel-wrapper.ready canvas#wheelCanvas {
            filter: drop-shadow(0 0 28px rgba(240, 200, 90, 0.7)) drop-shadow(0 8px 36px rgba(0, 0, 0, 0.6));
            cursor: pointer;
        }

        /* Указатель (стрелка) */
        .pointer {
            position: absolute;
            top: -16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            width: 0;
            height: 0;
            border-left: 18px solid transparent;
            border-right: 18px solid transparent;
            border-top: 28px solid #f0c960;
            filter: drop-shadow(0 2px 8px rgba(240, 201, 96, 0.8)) drop-shadow(0 0 12px rgba(240, 200, 80, 0.5));
            transition: filter 0.3s;
        }
        .pointer::after {
            content: '';
            position: absolute;
            top: -34px;
            left: -10px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: radial-gradient(circle, #fff 0%, #f0c960 60%, #8b6914 100%);
            filter: blur(1px);
            box-shadow: 0 0 16px rgba(240, 201, 96, 0.9);
        }

        /* ===== Панель управления ===== */
        .controls {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 14px;
            width: 100%;
            max-width: 480px;
        }
        .balance-display {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(20, 20, 40, 0.8);
            border: 1px solid rgba(180, 150, 80, 0.35);
            border-radius: 40px;
            padding: 10px 20px;
            font-weight: 600;
            font-size: 1rem;
            letter-spacing: 0.03em;
            white-space: nowrap;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        .balance-display .icon {
            font-size: 1.4rem;
        }
        .balance-display .count {
            color: var(--gold-bright);
            font-size: 1.3rem;
            font-weight: 700;
            min-width: 28px;
            text-align: center;
        }
        .total-spins-display {
            font-size: 0.78rem;
            color: var(--text-secondary);
            letter-spacing: 0.04em;
            text-align: center;
            margin-top: -10px;
        }
        .total-spins-display span {
            color: var(--gold);
            font-weight: 600;
        }

        /* Кнопки */
        .btn {
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.95rem;
            letter-spacing: 0.04em;
            padding: 12px 26px;
            border-radius: 40px;
            border: none;
            cursor: pointer;
            transition: all var(--transition-speed) ease;
            position: relative;
            overflow: hidden;
            white-space: nowrap;
            outline: none;
            text-transform: uppercase;
        }
        .btn:active {
            transform: scale(0.96);
        }

        /* Кнопка Крутить */
        .btn-spin {
            background: linear-gradient(180deg, #f0c960 0%, #c9973a 40%, #8b6914 100%);
            color: #1a1a0a;
            font-size: 1.1rem;
            font-weight: 700;
            padding: 14px 36px;
            box-shadow: 0 4px 20px rgba(200, 150, 50, 0.5), 0 0 40px rgba(220, 170, 60, 0.25);
            letter-spacing: 0.06em;
            text-shadow: 0 1px 0 rgba(255, 255, 255, 0.2);
        }
        .btn-spin:hover:not(:disabled) {
            background: linear-gradient(180deg, #f7d774 0%, #d4a843 40%, #a07818 100%);
            box-shadow: 0 6px 28px rgba(220, 170, 60, 0.65), 0 0 60px rgba(240, 200, 80, 0.35);
            transform: translateY(-2px);
        }
        .btn-spin:disabled {
            background: #3a3a4a;
            color: #777;
            cursor: not-allowed;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            text-shadow: none;
        }
