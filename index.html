<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>DARTVEL | Премиум Рулетка Metro Royale</title>
  <!-- Google Fonts: Montserrat -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background: #0a0a0a;
      color: #fff;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      position: relative;
      touch-action: pan-y;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* Фоновые параллакс-частицы (общие) */
    .particles-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      opacity: 0.25;
    }

    .particle {
      position: absolute;
      background: radial-gradient(circle, #ffd700 0%, transparent 70%);
      border-radius: 50%;
      animation: floatUp linear infinite;
    }

    @keyframes floatUp {
      0% { transform: translateY(0) scale(1); opacity: 0; }
      10% { opacity: 0.8; }
      90% { opacity: 0.6; }
      100% { transform: translateY(-110vh) scale(0.5); opacity: 0; }
    }

    /* Интерактивные золотые частицы для первого экрана */
    .gold-particles-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 2;
      overflow: hidden;
    }

    .gold-particle {
      position: absolute;
      pointer-events: none;
      will-change: transform, opacity;
      animation: goldFloat 6s ease-in-out infinite;
      filter: drop-shadow(0 0 6px rgba(255, 215, 0, 0.8));
    }

    @keyframes goldFloat {
      0%, 100% {
        transform: translate(0, 0) scale(1) rotate(0deg);
        opacity: 0.4;
      }
      25% {
        transform: translate(30px, -40px) scale(1.3) rotate(90deg);
        opacity: 0.9;
      }
      50% {
        transform: translate(-20px, -80px) scale(0.9) rotate(180deg);
        opacity: 0.6;
      }
      75% {
        transform: translate(15px, -50px) scale(1.1) rotate(270deg);
        opacity: 0.8;
      }
    }

    /* Разные вариации анимации для частиц */
    .gold-particle:nth-child(odd) {
      animation-duration: 7s;
      animation-delay: -2s;
    }

    .gold-particle:nth-child(3n) {
      animation-duration: 5.5s;
      animation-delay: -4s;
    }

    .gold-particle:nth-child(4n+1) {
      animation-duration: 8s;
      animation-delay: -1s;
    }

    .gold-particle:nth-child(5n+2) {
      animation-duration: 6.5s;
      animation-delay: -3s;
    }

    .app-container {
      position: relative;
      width: 100%;
      height: 100%;
      z-index: 1;
      transition: transform 0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      will-change: transform;
    }

    .screen {
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 20px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .screen-landing {
      background: radial-gradient(ellipse at center, #1a1a1a 0%, #0a0a0a 70%);
      gap: 25px;
      position: relative;
    }

    /* Затемнение для улучшения читаемости текста на фоне частиц */
    .screen-landing::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at center, transparent 30%, rgba(10, 10, 10, 0.6) 100%);
      pointer-events: none;
      z-index: 3;
    }

    .logo {
      font-size: clamp(2.8rem, 10vw, 4.5rem);
      font-weight: 800;
      letter-spacing: 6px;
      background: linear-gradient(180deg, #ffd700 20%, #b8860b 80%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 30px rgba(255, 215, 0, 0.4);
      filter: drop-shadow(0 0 20px #ffd70066);
      animation: logoGlow 2s ease-in-out infinite alternate;
      position: relative;
      z-index: 5;
    }

    @keyframes logoGlow {
      0% { filter: drop-shadow(0 0 15px #ffd70055); }
      100% { filter: drop-shadow(0 0 35px #ffd700aa); }
    }

    .subtitle {
      font-size: 1.1rem;
      text-align: center;
      color: #ccc;
      max-width: 320px;
      line-height: 1.6;
      letter-spacing: 0.5px;
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(10px);
      padding: 15px 20px;
      border-radius: 20px;
      border: 1px solid rgba(255,215,0,0.15);
      position: relative;
      z-index: 5;
    }

    .tg-links {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 100%;
      max-width: 300px;
      position: relative;
      z-index: 5;
    }

    .tg-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,215,0,0.3);
      padding: 14px 20px;
      border-radius: 40px;
      color: #ffd700;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s ease;
      font-size: 0.95rem;
      letter-spacing: 0.5px;
    }

    .tg-btn:hover {
      background: rgba(255,215,0,0.1);
      border-color: #ffd700;
      box-shadow: 0 0 25px rgba(255,215,0,0.2);
      transform: translateY(-2px);
    }

    .nav-down-btn {
      margin-top: 15px;
      background: linear-gradient(135deg, #ffd700, #b8860b);
      border: none;
      padding: 16px 32px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 1.1rem;
      color: #0a0a0a;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      letter-spacing: 1px;
      box-shadow: 0 8px 30px rgba(255,215,0,0.3);
      transition: all 0.3s ease;
      position: relative;
      z-index: 5;
    }

    .nav-down-btn:hover {
      box-shadow: 0 12px 40px rgba(255,215,0,0.5);
      transform: scale(1.03);
    }

    .arrow-down {
      font-size: 1.4rem;
      animation: bounceDown 1.2s infinite;
    }

    @keyframes bounceDown {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(6px); }
    }

    /* Экран 2: Рулетка */
    .screen-roulette {
      background: #0a0a0a;
      justify-content: flex-start;
      padding-top: 20px;
      gap: 15px;
    }

    .balance-panel {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      max-width: 420px;
      background: rgba(20,20,20,0.9);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,215,0,0.25);
      border-radius: 60px;
      padding: 8px 8px 8px 20px;
      margin-bottom: 5px;
    }

    .spin-count {
      font-weight: 700;
      font-size: 1.3rem;
      color: #ffd700;
      display: flex;
      align-items: center;
      gap: 8px;
    }
